<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
        document.addEventListener('DOMContentLoaded', function() {

            // Multiple choice
            let correct = document.querySelector('.correct');
            let incorrect = document.querySelectorAll('.incorrect');

            correct.addEventListener('click', function() {
                correct.style.backgroundColor = 'green';
                document.querySelector('#mc-feedback').innerHTML = 'Correct!';
            });

            for (let button of incorrect)
            {
                button.addEventListener('click', function() {
                    button.style.backgroundColor = 'red';
                    document.querySelector('#mc-feedback').innerHTML = 'Incorrect';
                });
            }

            // Free response
            document.querySelector('#confirm').addEventListener('click', function() {

                let answer = document.querySelector('#answer').value;

                if (answer.toLowerCase().includes('sheep'))
                {
                    document.querySelector('#fr-feedback').innerHTML = 'Correct!';
                }
                else
                {
                    document.querySelector('#fr-feedback').innerHTML = 'Incorrect';
                }
            });
        });
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>What is the approximate ratio of people to sheep in New Zealand</h3>
                <!-- TODO: Add multiple choice question here -->
                <button class='incorrect'>6 people per sheep</button>
                <button class='incorrect'>500 people per sheep</button>
                <button class = 'correct'>1 person per 6 sheep</button>

                <p id="mc-feedback"></p>

            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <h3>Why do u like or not like sheep?</h3>
                <!-- TODO: Add free response question here -->
                <input id='answer' type='text'>
                <button id='confirm'>Confirm</button>

                <p id="fr-feedback"></p>
            </div>
        </div>
    </body>
</html>
